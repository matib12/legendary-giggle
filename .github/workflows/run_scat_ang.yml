name: Run Scattering Angle Program

on:
  push:
    branches: [Mario_Perez]
  pull_request:
  workflow_dispatch:
    inputs:
      displacement:
        description: 'Initial displacement of atoms in Angstrom'
        required: true
        default: '5'
      kinetic_energy:
        description: 'Initial kinetic energy in eV'
        required: true
        default: '2'

jobs:
  run-scat-ang:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5           # updated from v3 → v5

      - name: Set up Python
        uses: actions/setup-python@v5       # updated from v4 → v5
        with:
          python-version: '3.x'             # always uses latest stable Python 3
          cache: 'pip'                       # caches dependencies for faster runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib

      - name: Run scat_ang program
        run: |
          printf '\n${{ github.event.inputs.displacement }}\n${{ github.event.inputs.kinetic_energy }}\n' | python scat_ang_CM_for_diatomics.py

      - name: Upload output
        uses: actions/upload-artifact@v4    # updated from v3 → v4
        with:
          name: scattering-output
          path: output/
        if: ${{ always() }}                 # uploads output even if the run fails
