name: my CI (Jupyter)

on: [push]

jobs:
build:
runs-on: ubuntu-latest

steps:
- uses: actions/checkout@v3

- name: Set up Python 3.13
uses: actions/setup-python@v4
with:
python-version: "3.13"

- name: Install dependencies
run: |
python -m pip install --upgrade pip
pip install numpy pyyaml notebook nbconvert

- name: Show directory
run: |
pwd
ls -R

- name: Run Jupyter Notebook
run: |
jupyter nbconvert --to notebook --execute Zhizhong Li/test.ipynb --output executed.ipynb
